services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies db/migrations/*.sql (idempotent — safe to re-run on every `up`).
  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -v ON_ERROR_STOP=1 -f /migrations/0001_init.sql &&
             psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -v ON_ERROR_STOP=1 -f /migrations/0002_matches_reviews.sql"

  core:
    build: ./services/core
    env_file: ./services/core/.env
    environment:
      # Override the .env's localhost values — inside the compose network,
      # Postgres and the agent are reachable by service name, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AGENT_BASE_URL: http://agent:8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - ./services/core:/app
      - core_node_modules:/app/node_modules

  agent:
    build: ./services/agent
    env_file: ./services/agent/.env
    ports:
      - "8000:8000"
    volumes:
      - ./services/agent:/app

  web:
    build: ./services/web
    environment:
      # NEXT_PUBLIC_* is read by the browser, so it must point at a host-reachable
      # URL (localhost), not the internal "core" service name.
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - core
    ports:
      - "3001:3001"
    volumes:
      - ./services/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next

volumes:
  db-data:
  core_node_modules:
  web_node_modules:
  web_next:
